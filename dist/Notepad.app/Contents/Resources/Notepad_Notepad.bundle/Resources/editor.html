<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="codemirror/lib/codemirror.min.css">
  <style>
    :root { color-scheme: light dark; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
    }
    body {
      overflow: hidden;
      background: Canvas;
      color: CanvasText;
    }
    .CodeMirror {
      height: 100vh;
      background: Canvas;
      color: CanvasText;
      font-family: var(--editor-font-family, -apple-system);
      font-size: var(--editor-font-size, 14px);
      line-height: var(--editor-line-height, 1.5);
    }
    .CodeMirror-scroll {
      overflow: auto !important;
    }
    .CodeMirror-lines {
      padding: 16px 18px;
      padding-bottom: max(45vh, 180px);
    }
    .CodeMirror pre,
    .CodeMirror-line,
    .CodeMirror-line-like {
      line-height: var(--editor-line-height, 1.5);
    }
    .CodeMirror-gutters {
      display: none;
      background: transparent;
      border: 0;
    }
    .CodeMirror-cursor {
      border-left-color: CanvasText !important;
      transform: scaleY(0.72);
      transform-origin: center;
    }
    .CodeMirror-selected {
      background: color-mix(in srgb, AccentColor 35%, transparent) !important;
    }
    .CodeMirror-focused .CodeMirror-selected {
      background: color-mix(in srgb, AccentColor 55%, transparent) !important;
    }
    .CodeMirror-selection-background {
      background: color-mix(in srgb, AccentColor 55%, transparent) !important;
    }
    .CodeMirror-placeholder {
      color: color-mix(in srgb, CanvasText 45%, transparent) !important;
    }
  </style>
</head>
<body>
  <textarea id="source"></textarea>
  <script src="codemirror/lib/codemirror.min.js"></script>
  <script src="codemirror/addon/display/placeholder.min.js"></script>
  <script src="codemirror/addon/search/searchcursor.js"></script>
  <script>
    const source = document.getElementById("source");
    const wrapper = document.documentElement;
    let suppressSend = false;
    let searchQuery = "";
    let replacementText = "";

    const editor = CodeMirror.fromTextArea(source, {
      lineWrapping: true,
      placeholder: "New note...",
      viewportMargin: Infinity
    });

    editor.on("changes", () => {
      if (suppressSend) return;
      window.webkit.messageHandlers.notepadTextChanged.postMessage(editor.getValue());
    });

    function applyConfig(config) {
      wrapper.style.setProperty("--editor-font-family", config.fontFamily);
      wrapper.style.setProperty("--editor-font-size", `${config.fontSize}px`);
      wrapper.style.setProperty("--editor-line-height", `${config.lineHeight}`);
      editor.setOption("lineWrapping", config.wordWrap);
      editor.refresh();
    }

    function normalizeLineEndings(value) {
      return value.replace(/\r\n/g, "\n");
    }

    function focusAndReveal(from, to) {
      editor.focus();
      editor.setSelection(from, to);
      editor.scrollIntoView({from, to}, 60);
    }

    function getCursorForDirection(reverse) {
      const cursor = editor.getSearchCursor(searchQuery, reverse ? editor.getCursor("from") : editor.getCursor("to"));
      if (cursor.find(reverse)) return cursor;

      const wrapped = editor.getSearchCursor(searchQuery, reverse ? CodeMirror.Pos(editor.lastLine()) : CodeMirror.Pos(0, 0));
      return wrapped.find(reverse) ? wrapped : null;
    }

    function find(reverse = false) {
      if (!searchQuery) return;
      const cursor = getCursorForDirection(reverse);
      if (!cursor) return;
      focusAndReveal(cursor.from(), cursor.to());
    }

    function replaceCurrent() {
      if (!searchQuery) return;
      const selection = editor.getSelection();
      if (selection !== searchQuery) {
        find(false);
      }
      if (editor.getSelection() === searchQuery) {
        editor.replaceSelection(replacementText);
      }
      find(false);
    }

    function replaceAll() {
      if (!searchQuery) return;
      const cursor = editor.getSearchCursor(searchQuery, CodeMirror.Pos(0, 0));
      const replacements = [];
      while (cursor.findNext()) {
        replacements.push({from: cursor.from(), to: cursor.to()});
      }
      for (let i = replacements.length - 1; i >= 0; i -= 1) {
        const match = replacements[i];
        editor.replaceRange(replacementText, match.from, match.to);
      }
    }

    window.notepad = {
      applyState(state) {
        applyConfig(state.preferences);
        if (editor.getValue() !== state.text) {
          const selections = editor.listSelections();
          suppressSend = true;
          editor.setValue(state.text);
          if (selections && selections.length > 0) {
            try {
              editor.setSelections(selections);
            } catch (_) {}
          }
          suppressSend = false;
        }
      },
      updateSearch(query, replacement) {
        searchQuery = normalizeLineEndings(query);
        replacementText = normalizeLineEndings(replacement);
      },
      runSearchCommand(command) {
        switch (command) {
          case "useSelectionForFind":
            window.webkit.messageHandlers.notepadSelection.postMessage(editor.getSelection());
            break;
          case "findNext":
            find(false);
            break;
          case "findPrevious":
            find(true);
            break;
          case "replaceCurrent":
            replaceCurrent();
            break;
          case "replaceAll":
            replaceAll();
            break;
        }
      },
      focusEditor() {
        editor.focus();
      }
    };

    requestAnimationFrame(() => {
      window.notepad.focusEditor();
    });
  </script>
</body>
</html>
